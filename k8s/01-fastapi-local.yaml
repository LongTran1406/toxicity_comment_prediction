apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-env
  namespace: data-platform
data:
  MLFLOW_TRACKING_URI: "http://192.168.0.143:5000"
  MLFLOW_S3_ENDPOINT_URL: "http://192.168.0.143:9000"
  REDIS_HOST: "192.168.0.143"
  KAFKA_BOOTSTRAP_SERVERS: "192.168.0.143:9093"

---
# ─────────────────────────────────────────────
# DEPLOYMENT
# ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  namespace: data-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
        - name: fastapi
          image: fastapi-custom:latest
          imagePullPolicy: Never           # use local image
          ports:
            - containerPort: 8000

          # ── non-secret env from ConfigMap ──
          envFrom:
            - configMapRef:
                name: fastapi-env

          # ── secret env ────────────────────
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: fastapi-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: fastapi-secrets
                  key: AWS_SECRET_ACCESS_KEY

          # ── health check ──────────────────
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6

---
# ─────────────────────────────────────────────
# SERVICE
# ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: fastapi
  namespace: data-platform
spec:
  selector:
    app: fastapi
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30001